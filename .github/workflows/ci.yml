name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      # adt-ls/SAP-dependent tests self-skip without a binary / ARC1_TEST_SAP_PASSWORD
      # (BYO adt-ls is never in CI — ADR-0002).
      - run: npm test
