# BTP Cloud Foundry manifest for arc-1-lsp (no secrets — ARC1_API_KEYS is set via
# `cf set-env`). Image is the public/BYO-built linux/amd64 container on ghcr.
applications:
  - name: arc-1-lsp
    docker:
      image: ghcr.io/marianfoo/arc-1-lsp:latest # dev instance tracks latest; a future release CI pins :X.Y.Z
      username: marianfoo # pull creds via CF_DOCKER_PASSWORD until the package is public
    memory: 2G
    disk_quota: 2G
    instances: 1
    health-check-type: http
    health-check-http-endpoint: /healthz
    health-check-invocation-timeout: 30
    timeout: 180 # adt-ls (JVM/Eclipse) cold start before the http server binds
    env:
      ARC1_TRANSPORT: http-streamable
      ARC1_LOG_LEVEL: info
    # SAP connection + API key are set via `cf set-env` (secrets, never committed):
    #   DIRECT mode (internet-reachable backend, e.g. a4h):
    #     cf set-env arc-1-lsp ARC1_SAP_HOST a4h.marianzeis.de
    #     cf set-env arc-1-lsp ARC1_SAP_PORT 50001
    #     cf set-env arc-1-lsp ARC1_SAP_USER DEVELOPER
    #     cf set-env arc-1-lsp ARC1_SAP_PASSWORD <secret>
    #     cf set-env arc-1-lsp ARC1_SAP_DESTINATION A4H   # adt-ls destination id
    #   CC mode (on-prem via Cloud Connector): bind connectivity+destination, then
    #     cf set-env arc-1-lsp ARC1_SAP_DESTINATION <btp-destination-name>
    #     (unset the direct ARC1_SAP_* so planConnection picks connectivity mode)
    #   Edge auth:  cf set-env arc-1-lsp ARC1_API_KEYS <key>[:label]
    # Re-push tip: `cf stop arc-1-lsp` first if the org memory quota is tight.
